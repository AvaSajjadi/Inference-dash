# Nixpacks configuration for Railway
# Include R runtime and build dependencies
# Package installation handled via Procfile release phase

[build]
nixpkgs_archive = "nixpkgs=https://github.com/NixOS/nixpkgs/archive/23.11.tar.gz"

[[build.nix_pkgs]]
value = "R"

[[build.nix_pkgs]]
value = "gcc"

[[build.nix_pkgs]]
value = "glibc"

[[build.nix_pkgs]]
value = "curl"

[[build.nix_pkgs]]
value = "git"

[[build.nix_pkgs]]
value = "libxml2"
